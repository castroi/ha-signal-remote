version: 2
updates:
  # JavaScript/TypeScript dependencies (pnpm uses the npm ecosystem)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
    # Majors land as their own PRs so they get individual review, except
    # where the runtime constrains us:
    ignore:
      # @types/node must track the Node runtime (engines: >=20 <21).
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"

  # GitHub Actions used in CI/deploy workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      # Collapse all action bumps into a single PR instead of one per action.
      github-actions:
        patterns:
          - "*"

  # Base image in the Dockerfile
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
