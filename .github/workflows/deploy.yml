name: Deploy

# Build and publish the linux/arm64 image to GHCR on merge to main.
# Publish-only: the Pi pulls the image itself (no inbound path to the Pi),
# matching the design's "no inbound port" property (§3).
#
# Pull on the Pi with:
#   docker pull ghcr.io/<owner>/home-control-bridge:latest
# (Watchtower can automate the pull if you run it on the Pi.)

on:
  push:
    branches: [main]

# One deploy at a time; a newer merge supersedes an in-flight build.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/home-control-bridge

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # arm64 build on an amd64 runner needs QEMU emulation.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # `latest` for the rolling tag the Pi pulls, plus the commit SHA for
          # pinning/rollback.
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
